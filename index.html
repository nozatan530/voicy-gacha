<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>のざたんの気まぐれアーカイブガチャ</title>
<meta property="og:title" content="のざたんの気まぐれアーカイブガチャ">
<meta property="og:description" content="Voicy「学びのセカンドオピニオン」の過去放送をガチャで掘り起こす遊び場。">
<meta property="og:type" content="website">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;700&family=Rubik:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    /* meetupsensei.com の実測カラー */
    --cream: #faf5e5;
    --cream-dot: #f0e6cc;
    --cream-glow: #f3e7c9;
    --navy: #0f172a;
    --navy-soft: #334155;
    --gold: #dca54a;
    --gold-deep: #b9863a;
    --gold-pale: #f3d9a6;
    --white: #ffffff;
    --gray-line: #d8d2c0;
  }

  body {
    font-family: 'Karla', sans-serif;
    background-color: var(--cream);
    background-image: radial-gradient(var(--cream-dot) 2px, transparent 2px);
    background-size: 30px 30px;
    color: var(--navy);
    overflow-x: hidden;
  }

  .font-heading { font-family: 'Rubik', sans-serif; }

  /* カプセル：通常はふわふわ */
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }
  .bouncing { animation: bounce 1s infinite ease-in-out; }

  /* カプセル：抽選中は揺れる */
  @keyframes shake {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    20% { transform: translate(-3px, 0) rotate(1deg); }
    40% { transform: translate(1px, -1px) rotate(1deg); }
    60% { transform: translate(-3px, 1px) rotate(0); }
    80% { transform: translate(-1px, -1px) rotate(1deg); }
    100% { transform: translate(1px, -2px) rotate(-1deg); }
  }
  .shaking { animation: shake 0.5s infinite; }

  /* レア度別カード：サイトのクリーム×ネイビー×ゴールドを基調に */
  .card-N {
    background: linear-gradient(135deg, #ffffff 0%, #f6f3ea 100%);
    border: 2px solid #b9b29a;
    box-shadow: 0 4px 6px rgba(15, 23, 42, 0.08);
  }
  .card-R {
    background: linear-gradient(135deg, #ffffff 0%, var(--cream-glow) 100%);
    border: 2px solid var(--gold-pale);
    box-shadow: 0 0 15px rgba(220, 165, 74, 0.25);
  }
  .card-SR {
    background: linear-gradient(135deg, #fff8e8 0%, var(--gold-pale) 100%);
    border: 2px solid var(--gold);
    box-shadow: 0 0 20px rgba(220, 165, 74, 0.45);
    position: relative;
    overflow: hidden;
  }
  .card-SR::before {
    content: "";
    position: absolute;
    top: -50%; left: -50%; width: 200%; height: 200%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.9) 50%, rgba(255,255,255,0) 100%);
    transform: rotate(45deg);
    animation: shine 3s infinite;
  }
  /* SSR：プレミアム放送だけは夜のスポットライト風（ネイビー×ゴールド反転） */
  .card-SSR {
    background: linear-gradient(135deg, #1e2944 0%, var(--navy) 60%, #0a0f1d 100%);
    border: 3px solid var(--gold);
    box-shadow: 0 0 30px rgba(220, 165, 74, 0.7), inset 0 0 16px rgba(220, 165, 74, 0.15);
    color: #f5ecd8;
    position: relative;
    overflow: hidden;
    animation: pulse-border 2s infinite;
  }
  .card-SSR::before {
    content: "";
    position: absolute;
    top: -100%; left: -100%; width: 300%; height: 300%;
    background: conic-gradient(transparent, rgba(220, 165, 74, 0.5), transparent 30%);
    animation: rotate-shine 4s linear infinite;
  }
  .card-SSR .result-title,
  .card-SSR .result-date,
  .card-SSR .result-meta { color: #f5ecd8 !important; }

  @keyframes shine {
    0% { left: -100%; top: -100%; }
    20% { left: 100%; top: 100%; }
    100% { left: 100%; top: 100%; }
  }
  @keyframes rotate-shine { 100% { transform: rotate(360deg); } }
  @keyframes pulse-border {
    0% { box-shadow: 0 0 20px rgba(220, 165, 74, 0.5); }
    50% { box-shadow: 0 0 38px rgba(220, 165, 74, 0.85); }
    100% { box-shadow: 0 0 20px rgba(220, 165, 74, 0.5); }
  }

  .hide { display: none !important; }
  .fade-in { animation: fadeIn 0.5s forwards; }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .card-N > *, .card-R > *, .card-SR > *, .card-SSR > * {
    position: relative;
    z-index: 1;
  }

  /* 埋め込みプレイヤー */
  .player-wrap {
    border-radius: 8px;
    overflow: hidden;
    background: rgba(15, 23, 42, 0.04);
    min-height: 0;
  }
  .player-wrap:not(:empty) { min-height: 385px; }
  .player-wrap iframe { display: block; width: 100%; border: 0; }
  .card-SSR .player-wrap { background: rgba(255, 255, 255, 0.06); }
  .player-fallback {
    font-size: 0.7rem;
    opacity: 0.65;
    text-align: center;
  }

  @media (prefers-reduced-motion: reduce) {
    .bouncing, .shaking, .card-SR::before, .card-SSR::before, .card-SSR { animation: none; }
    .fade-in { animation: none; }
  }
</style>
</head>

t": "#3 会いに行けるセンセイに会いに来きてくださった２組の方", "u": "https://voicy.jp/channel/3708/pwcr5oxf5j", "l": 5, "o": "レギュラー放送", "r": "N", "len": "0:16:20", "embed_id": "539740"}, {"d": "2023-05-31", "t": "#2 「理科の実験後、生徒搬送」のニュースについて", "u": "https://voicy.jp/channel/3708/vv9lihz3tf", "l": 5, "o": "レギュラー放送", "r": "N", "len": "0:11:17", "embed_id": "538962"}, {"d": "2023-05-30", "t": "#1 はじめましてのごあいさつ", "u": "https://voicy.jp/channel/3708/d37dl7rdo5", "l": 22, "o": "レギュラー放送", "r": "SR", "len": "0:9:38", "embed_id": "538279"}]</script>

  <script>
    // ============================================================
    // CONFIG ─ 他のチャンネルで使うときはここを編集してください
    // ============================================================
    const CONFIG = {
      rarityWeights: { SSR: 5, SR: 15, R: 30, N: 50 },
      rarityMeta: {
        SSR: { name: 'SSR', text: 'プレミアム放送！表では聴けない話をぜひ！', color: '#0f172a' },
        SR:  { name: 'SR',  text: 'リスナーがざわついたあの回！！',   color: '#dca54a' },
        R:   { name: 'R',   text: 'リスナー反応多めの良回！',                 color: '#b9863a' },
        N:   { name: 'N',   text: '日常回。これもまた味わい深く。',           color: '#9ca3af' },
      },
      shareHashtag: 'のざたんガチャ',
      shareTextTemplate: (rarity, title) =>
        `のざたんガチャを引いたら【${rarity}】が出ました！\n「${title}」\n`,
    };

    // ============================================================
    // 以下は通常編集不要
    // ============================================================

    const els = {
      gachaMachine: document.getElementById('gacha-machine'),
      resultScreen: document.getElementById('result-screen'),
      drawBtn: document.getElementById('draw-btn'),
      retryBtn: document.getElementById('retry-btn'),
      shareBtn: document.getElementById('share-btn'),
      capsuleImage: document.getElementById('capsule-image'),
      rarityBadge: document.getElementById('rarity-badge'),
      rarityText: document.getElementById('rarity-text'),
      resultCard: document.getElementById('result-card'),
      episodeDate: document.getElementById('episode-date'),
      episodeTitle: document.getElementById('episode-title'),
      episodeLength: document.getElementById('episode-length'),
      episodeLikes: document.getElementById('episode-likes'),
      episodeOption: document.getElementById('episode-option'),
      resultPlayer: document.getElementById('result-player'),
      playerFallback: document.getElementById('player-fallback'),
      voicyLink: document.getElementById('voicy-link'),
      introText: document.getElementById('intro-text'),
    };

    let episodes = [];
    let episodesByRarity = { SSR: [], SR: [], R: [], N: [] };
    let currentResult = null;

    function loadEpisodes() {
      const inlineEl = document.getElementById('episodes-data');
      const inlineText = inlineEl ? inlineEl.textContent.trim() : '';

      // インラインJSONが埋め込まれていれば、それを使う（standalone版）
      if (inlineText) {
        try {
          episodes = JSON.parse(inlineText);
          finishLoad();
          return;
        } catch (err) {
          console.error('インラインJSONの解析に失敗:', err);
        }
      }

      // インラインJSONがない場合は外部ファイルから読み込む（gacha.html版）
      fetch('./episodes.json', { cache: 'no-store' })
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        })
        .then(data => { episodes = data; finishLoad(); })
        .catch(err => {
          els.introText.textContent = '放送データの読み込みに失敗しました。';
          console.error(err);
        });
    }

    function finishLoad() {
      episodesByRarity = { SSR: [], SR: [], R: [], N: [] };
      episodes.forEach(ep => {
        if (episodesByRarity[ep.r]) episodesByRarity[ep.r].push(ep);
      });
      els.introText.innerHTML =
        `収録放送数 <strong style="color:#b9863a;">${episodes.length}本</strong><br>運命の1本に出会おう！`;
    }

    function rollRarity() {
      const w = CONFIG.rarityWeights;
      const total = Object.values(w).reduce((a, b) => a + b, 0);
      let r = Math.random() * total;
      for (const [rarity, weight] of Object.entries(w)) {
        r -= weight;
        if (r <= 0 && episodesByRarity[rarity].length > 0) return rarity;
      }
      for (const rarity of ['SSR', 'SR', 'R', 'N']) {
        if (episodesByRarity[rarity].length > 0) return rarity;
      }
      return 'N';
    }

    function pickEpisode(rarity) {
      const pool = episodesByRarity[rarity];
      if (!pool || pool.length === 0) return null;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    // Voicy埋め込みURLを生成（embed_idがあれば優先、なければスラッグにフォールバック）
    function buildEmbedUrl(episode) {
      if (!episode) return null;
      if (episode.embed_id) {
        try {
          const u = new URL(episode.u);
          const m = u.pathname.match(/^\/channel\/(\d+)\//);
          if (m) return `https://voicy.jp/embed/channel/${m[1]}/${episode.embed_id}`;
        } catch {}
      }
      try {
        const u = new URL(episode.u);
        const m = u.pathname.match(/^\/channel\/(\d+)\/([^/]+)/);
        if (m) return `https://voicy.jp/embed/channel/${m[1]}/${m[2]}`;
      } catch {}
      return null;
    }

    function renderPlayer(episode) {
      const embedUrl = buildEmbedUrl(episode);
      els.resultPlayer.innerHTML = '';
      if (!embedUrl) return;
      const iframe = document.createElement('iframe');
      iframe.src = embedUrl;
      iframe.width = '100%';
      iframe.height = '385';
      iframe.frameBorder = '0';
      iframe.scrolling = 'no';
      iframe.style.overflow = 'hidden';
      iframe.title = 'Voicy 埋め込みプレイヤー';
      iframe.loading = 'lazy';
      els.resultPlayer.appendChild(iframe);
    }

    function drawGacha() {
      if (episodes.length === 0) return;
      els.drawBtn.disabled = true;
      els.drawBtn.innerHTML = '<span aria-hidden="true">🌀</span> 抽選中...';
      els.capsuleImage.classList.remove('bouncing');
      els.capsuleImage.classList.add('shaking');

      setTimeout(() => {
        const rarity = rollRarity();
        const ep = pickEpisode(rarity);
        if (!ep) return;
        currentResult = { rarity, episode: ep };
        showResult(rarity, ep);
      }, 1500);
    }

    function showResult(rarity, ep) {
      const meta = CONFIG.rarityMeta[rarity];

      els.gachaMachine.classList.add('hide');
      els.resultScreen.classList.remove('hide');
      els.resultScreen.classList.add('flex', 'fade-in');

      els.rarityBadge.textContent = meta.name;
      els.rarityBadge.style.background = meta.color;
      els.rarityText.textContent = meta.text;

      els.resultCard.className = `card-${rarity} rounded-2xl p-6 mb-6 w-full text-center flex flex-col gap-4 justify-center relative`;

      els.episodeTitle.textContent = ep.t;
      els.episodeDate.textContent = (ep.d || '').replace(/-/g, '.');
      els.episodeLength.innerHTML = `⏱ ${ep.len || '―'}`;
      els.episodeLikes.innerHTML = `❤ ${ep.l}`;

      renderPlayer(ep);

      if (rarity === 'SSR') {
        els.episodeOption.classList.remove('hidden');
        els.voicyLink.innerHTML = '<span aria-hidden="true">▶</span> プレミアム放送を開く';
      } else {
        els.episodeOption.classList.add('hidden');
        els.voicyLink.innerHTML = '<span aria-hidden="true">▶</span> Voicyで開く';
      }
      els.voicyLink.href = ep.u;

      els.drawBtn.disabled = false;
      els.drawBtn.innerHTML = '<span aria-hidden="true">✨</span> ガチャを回す！';
      els.capsuleImage.classList.remove('shaking');
      els.capsuleImage.classList.add('bouncing');
    }

    function resetGacha() {
      els.resultScreen.classList.remove('fade-in', 'flex');
      els.resultScreen.classList.add('hide');
      els.resultPlayer.innerHTML = '';
      els.gachaMachine.classList.remove('hide');
    }

    function shareResult() {
      if (!currentResult) return;
      const { rarity, episode } = currentResult;
      const text = CONFIG.shareTextTemplate(rarity, episode.t);
      const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(episode.u)}&hashtags=${encodeURIComponent(CONFIG.shareHashtag)}`;
      window.open(url, '_blank', 'noopener');
    }

    els.drawBtn.addEventListener('click', drawGacha);
    els.retryBtn.addEventListener('click', resetGacha);
    els.shareBtn.addEventListener('click', shareResult);

    loadEpisodes();
  </script>

</body>
</html>
